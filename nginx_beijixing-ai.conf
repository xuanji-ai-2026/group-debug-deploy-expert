server {
    listen 80;
    server_name www.beijixing-ai.com beijixing-ai.com;
    return 301 https://www.beijixing-ai.com$request_uri;
}

server {
    listen 443 ssl;
    http2 on;
    server_name www.beijixing-ai.com beijixing-ai.com;

    ssl_certificate /etc/letsencrypt/live/www.beijixing-ai.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/www.beijixing-ai.com/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!MD5;
    ssl_prefer_server_ciphers on;
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 10m;

    client_max_body_size 100m;

    location /api/ {
        proxy_pass http://127.0.0.1:8080/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_connect_timeout 60s;
        proxy_read_timeout 120s;
        proxy_send_timeout 60s;
    }

    location /admin/ {
        alias /opt/beijixing-ai/frontend/dist-admin/;
        index index.html;
        try_files $uri $uri/ /admin/index.html;
    }

    location / {
        root /opt/beijixing-ai/frontend/dist-pc;
        index index.html;
        try_files $uri $uri/ /index.html;
    }
}

server {
    listen 8070;
    server_name _;

    location /api/ {
        proxy_pass http://127.0.0.1:8080/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    location /admin/ {
        alias /opt/beijixing-ai/frontend/dist-admin/;
        index index.html;
    }

    location / {
        root /opt/beijixing-ai/frontend/dist-pc;
        index index.html;
        try_files $uri $uri/ /index.html;
    }
}
