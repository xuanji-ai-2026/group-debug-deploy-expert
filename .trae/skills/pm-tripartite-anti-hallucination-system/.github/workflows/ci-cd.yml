name: CI/CD Pipeline

on:
  push:
    branches: [ main, develop ]
    tags: [ 'v*' ]
  pull_request:
    branches: [ main ]

jobs:
  # Job 1: Lint和代码质量检查
  lint:
    name: 📋 Code Quality Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: 'pip'
      
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install flake8 bandit black isort mypy
          pip install -e ".[dev]"
      
      - name: Run Flake8 (Lint)
        run: flake8 . --count --statistics --show-source || true
      
      - name: Run Bandit (Security)
        run: bandit -r . -ll || true
      
      - name: Run Black (Formatter check)
        run: black --check . || true
      
      - name: Run Isort (Import sort)
        run: isort --check-only . || true

  # Job 2: 类型检查
  type-check:
    name: 🔍 Type Checking
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: 'pip'
      
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install mypy
          pip install -e ".[dev]"
      
      - name: Run MyPy
        run: mypy --ignore-missing-imports . || true

  # Job 3: 单元测试
  test:
    name: 🧪 Unit Tests
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
        python-version: ["3.9", "3.10", "3.11", "3.12"]
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: 'pip'
      
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pytest pytest-cov
          pip install -e ".[test]"
      
      - name: Run tests with coverage
        run: pytest tests/ -v --tb=short --cov=src --cov-report=term-missing || echo "No tests found yet"
      
      - name: Upload coverage to Codecov
        if: matrix.os == 'ubuntu-latest' && matrix.python-version == '3.11'
        uses: codecov/codecov-action@v4
        with:
          token: ${{ secrets.CODECOV_TOKEN }}

  # Job 4: 构建和打包
  build:
    name: 📦 Build Package
    runs-on: ubuntu-latest
    needs: [lint, test]
    if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/')
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: 'pip'
      
      - name: Install build dependencies
        run: |
          python -m pip install --upgrade pip
          pip install setuptools wheel twine build
      
      - name: Build package
        run: python -m build
      
      - name: Create distribution archives
        run: python setup.py sdist bdist_wheel
      
      - name: Check package
        run: twine check dist/*
      
      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: dist-packages
          path: dist/

  # Job 5: 发布到PyPI (仅限tag触发)
  publish-pypi:
    name: 🚀 Publish to PyPI
    runs-on: ubuntu-latest
    needs: [build]
    if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/')
    environment:
      TWINE_USERNAME: __token__
      TWINE_PASSWORD: ${{ secrets.PYPI_API_TOKEN }}
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: 'pip'
      
      - name: Install publishing tools
        run: |
          python -m pip install --upgrade pip
          pip install twine build
      
      - name: Download dist from previous job
        uses: actions/download-artifact@v4
        with:
          name: dist-packages
          path: dist/
      
      - name: Publish to PyPI
        run: twine upload dist/*

  # Job 6: 创建GitHub Release
  release:
    name: 🎉 GitHub Release
    runs-on: ubuntu-latest
    needs: [publish-pypi]
    if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/')
    permissions:
      contents: write
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Extract version from tag
        id: version
        run: echo "VERSION=${GITHUB_REF#refs/tags/v}" >> $GITHUB_OUTPUT
      
      - name: Generate changelog
        id: changelog
        run: |
          # 简化的changelog生成（实际可使用towncrier等工具）
          cat > CHANGELOG.md << EOF
          ## Changelog
          
          ### ${{ steps.version.outputs.VERSION }} ($(date +'%Y-%m-%d'))
          
          #### Added
          - 完整的三权分立架构（Developer/Auditor/Acceptor/Dispatcher）
          - 物理防越权机制（工具白名单+SDK层拦截）
          - 强制RCA前置原则（根因分析优先）
          - 精确手术式热修改（<50行限制+活体注释）
          - 企业级文件锁系统（排他锁+共享锁+死锁检测）
          - 角色专属日志系统（每个角色独立可写日志+跨角色只读访问）
          - 时间戳流转规则引擎（accept < audit < dev严格时序验证）
          - 自驱动核心引擎（文件发现+自动工作流驱动+心跳检测）
          - 熔断与回滚机制（3次不通过→genesis回滚→人类裁决）
          - V2增强页头（三方签名+设计规格+技术来源归因）
          - 调度师V2深度日志集成（每次动作强制留痕）
          
          #### Changed
          - N/A (initial release)
          
          #### Fixed
          - N/A (initial release)
          EOF
      
      - name: Create GitHub Release
        uses: softprops/action-gh-release@v1
        with:
          tag_name: ${{ github.ref_name }}
          name: Release ${{ steps.version.outputs.VERSION }}
          body_path: ./CHANGELOG.md
          files: dist/*
          draft: false
          prerelease: false
