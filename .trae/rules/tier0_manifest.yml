## 🔄 INTEGRITY VERIFICATION PROTOCOL (完整性验证协议)

### WHEN TO VERIFY (验证时机)

1. **Before any critical operation** — AI执行重要任务前自动验证
2. **After Human-approved modification** — 人工批准修改后更新hash
3. **On session start** — 新会话开始时快速检查
4. **On suspicious behavior** — 检测到异常行为时触发完整验证

### HOW TO VERIFY (验证方法)

```bash
#!/bin/bash
# integrity_verify.sh — TIER 0 文件完整性验证脚本

echo "🔒 TIER 0 Constitutional File Integrity Verification"
echo "====================================================="

MANIFEST_FILE=".trae/rules/tier0_manifest.yml"
VIOLATIONS_FOUND=0

# Check if manifest exists
if [ ! -f "$MANIFEST_FILE" ]; then
    echo "❌ ERROR: Manifest file not found: $MANIFEST_FILE"
    exit 1
fi

# For each TIER 0 file, verify hash
for file in ".trae/skills/group-debug-deploy-expert/SKILL.md" \
           ".trae/rules/project_rules.md" \
           ".trae/rules/core_file_protection.md"; do
    
    echo ""
    echo "📄 Verifying: $file"
    
    if [ ! -f "$file" ]; then
        echo "❌ CRITICAL: File MISSING! This is a security violation."
        ((VIOLATIONS_FOUND++))
        continue
    fi
    
    # Calculate current hash
    CURRENT_HASH=$(sha256sum "$file" | awk '{print $1}')
    echo "   Current SHA256: $CURRENT_HASH"
    
    # TODO: Compare with manifest hash (requires YAML parsing)
    # echo "   Manifest SHA256: [from manifest]"
    
    # Check file modification time
    MOD_TIME=$(stat -c %y "$file" | cut -d'.' -f1)
    echo "   Last Modified: $MOD_TIME"
    
    # Check for unexpected modifications (heuristic)
    # TODO: Implement time-based anomaly detection
    
done

echo ""
echo "====================================================="
if [ $VIOLATIONS_FOUND -eq 0 ]; then
    echo "✅ ALL CLEAR: No integrity violations detected."
    exit 0
else
    echo "🚨 VIOLATIONS DETECTED: $VIOLATIONS_FOUND file(s) compromised!"
    echo "⛔ IMMEDIATE ACTION REQUIRED: Report to Human immediately."
    exit 2
fi
```

