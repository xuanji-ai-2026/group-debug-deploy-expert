# ============================================================
# 北极星AI商机获客系统 - Redis 配置文件
# Network Engineer: 郑华 (EMP-NETWORK-001)
# Description: Redis 7.x 生产环境优化配置
# ============================================================

# ============================================================
# 基础配置
# ============================================================

# 绑定地址（Docker环境中监听所有接口）
bind 0.0.0.0

# 端口配置
port 6379

# TCP连接队列长度
tcp-backlog 511

# 超时时间（秒），0表示不超时
timeout 300

# TCP keepalive
tcp-keepalive 60

# 保护模式（Docker环境中需关闭以允许外部连接）
protected-mode no

# ============================================================
# 安全配置
# ============================================================

# 密码认证（生产环境必须设置）
requirepass BeijixingRedis@2026

# 命令重命名（安全措施）
# rename-command FLUSHALL ""
# rename-command FLUSHDB ""
# rename-command CONFIG "CONFIG_9f8d7e6f3a2b1c"

# ============================================================
# 通用配置
# ============================================================

# 后台运行（Docker中需要设为no）
daemonize no

# 进程ID文件
pidfile /var/run/redis/redis-server.pid

# 日志级别（debug/verbose/notice/warning）
loglevel notice

# 日志文件（空字符串表示输出到stdout，适合Docker）
logfile ""

# 数据库数量
databases 16

# 是否显示logo
always-show-logo no

# ============================================================
# 持久化配置 - RDB
# ============================================================

# RDB文件名
dbfilename dump.rdb

# RDB文件保存目录
dir /data

# RDB保存策略（满足任一条件即触发）
# 900秒内至少1个key变化
save 900 1
# 300秒内至少10个key变化
save 300 10
# 60秒内至少10000个key变化
save 60 10000

# 如果BGSAVE失败，是否停止写入
stop-writes-on-bgsave-error yes

# 是否压缩RDB文件
rdbcompression yes

# RDB文件校验
rdbchecksum yes

# 主从复制时是否删除复制缓冲区数据
replica-serve-stale-data yes

# 只读副本
replica-read-only yes

# ============================================================
# 持久化配置 - AOF
# ============================================================

# 启用AOF
appendonly yes

# AOF文件名
appendfilename "appendonly.aof"

# AOF同步策略
# always: 每次写入都同步（最安全，最慢）
# everysec: 每秒同步（推荐，平衡安全和性能）
# no: 由操作系统决定（最快，最不安全）
appendfsync everysec

# AOF重写时是否不执行fsync
no-appendfsync-on-rewrite no

# AOF自动重写触发条件
auto-aof-rewrite-percentage 100
auto-aof-rewrite-min-size 64mb

# AOF加载时是否截断损坏部分
aof-load-truncated yes

# AOF重写时使用RDB前缀
aof-use-rdb-preamble yes

# ============================================================
# 内存管理
# ============================================================

# 最大内存限制（根据服务器内存调整）
# 示例：maxmemory 2gb
maxmemory 512mb

# 内存淘汰策略
# volatile-lru: 从设置了过期时间的key中使用LRU淘汰（推荐）
# allkeys-lru: 从所有key中使用LRU淘汰
# volatile-lfu: 从设置了过期时间的key中使用LFU淘汰
# allkeys-lfu: 从所有key中使用LFU淘汰
# volatile-random: 从设置了过期时间的key中随机淘汰
# allkeys-random: 从所有key中随机淘汰
# volatile-ttl: 淘汰即将过期的key
# noeviction: 不淘汰，返回错误（默认）
maxmemory-policy volatile-lru

# 内存采样数量（LRU/LFU/TTL）
maxmemory-samples 5

# 从库是否忽略maxmemory限制
replica-ignore-maxmemory yes

# ============================================================
# 线程配置
# ============================================================

# IO线程数（仅用于多线程IO，Redis 6.0+）
# 建议设置为CPU核心数或更低
io-threads 4

# 是否启用多线程IO
io-threads-do-reads yes

# ============================================================
# 客户端配置
# ============================================================

# 最大客户端连接数
maxclients 10000

# 客户端输出缓冲区限制
client-output-buffer-limit normal 0 0 0
client-output-buffer-limit replica 256mb 64mb 60
client-output-buffer-limit pubsub 32mb 8mb 60

# 客户端查询缓冲区限制
client-query-buffer-limit 1gb

# ============================================================
# 慢日志配置
# ============================================================

# 慢日志执行时间阈值（微秒）
slowlog-log-slower-than 10000

# 慢日志最大条数
slowlog-max-len 128

# ============================================================
# 延迟监控
# ============================================================

# 延迟监控阈值（毫秒）
latency-monitor-threshold 100

# ============================================================
# 事件通知
# ============================================================

# 键空间事件通知
# K - 键空间事件，以__keyspace@<db>__为前缀
# E - 键事件，以__keyevent@<db>__为前缀
# g - 通用命令（非特定类型）
# $ - 字符串命令
# l - 列表命令
# s - 集合命令
# h - 哈希命令
# z - 有序集合命令
# x - 过期事件
# e - 驱逐事件
# A - g$lshzxe的别名
notify-keyspace-events "Ex"

# ============================================================
# 哈希配置
# ============================================================

# 哈希编码阈值
hash-max-ziplist-entries 512
hash-max-ziplist-value 64

# ============================================================
# 列表配置
# ============================================================

# 列表编码阈值
list-max-ziplist-size -2
list-compress-depth 0

# ============================================================
# 集合配置
# ============================================================

# 集合编码阈值
set-max-intset-entries 512

# ============================================================
# 有序集合配置
# ============================================================

# 有序集合编码阈值
zset-max-ziplist-entries 128
zset-max-ziplist-value 64

# ============================================================
# HyperLogLog配置
# ============================================================

# HyperLogLog稀疏编码字节限制
hll-sparse-max-bytes 3000

# ============================================================
# 流配置
# ============================================================

# 流节点最大字节数
stream-node-max-bytes 4096
stream-node-max-entries 100

# ============================================================
# 主动重新哈希
# ============================================================

# 是否启用主动重新哈希
activerehashing yes

# 重新哈希每批处理槽数
# 默认情况下，这不需要修改

# ============================================================
# 检查点配置
# ============================================================

# 客户端暂停超时
dynamic-hz yes

# 检查点时间间隔
hz 10

# ============================================================
# 集群配置（预留）
# ============================================================
# cluster-enabled yes
# cluster-config-file nodes.conf
# cluster-node-timeout 5000
# cluster-require-full-coverage no
# cluster-migration-barrier 1

# ============================================================
# 哨兵配置（预留）
# ============================================================
# 哨兵模式需要在单独的配置文件中配置
