version: '3.8'

# 北极星AI商机获客系统 - 开发环境单体配置
# 启动: docker-compose -f docker-compose.dev.yml up -d
# 最后更新: 2026-05-28 (单体清理版)

services:
  # ============================================
  # 基础设施层 - Infrastructure (开发模式)
  # ============================================

  mariadb:
    image: mariadb:10.11
    container_name: beijixing-mariadb-dev
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: root123
      MYSQL_DATABASE: beijixing_ai
      MYSQL_USER: beijixing
      MYSQL_PASSWORD: dev123
      TZ: Asia/Shanghai
    ports:
      - "3306:3306"
    volumes:
      - mariadb_data_dev:/var/lib/mysql
      - ./init/mariadb:/docker-entrypoint-initdb.d:ro
    networks:
      - beijixing-network-dev
    healthcheck:
      test: ["CMD", "mariadb-admin", "ping", "-h", "localhost", "-u", "root", "-proot123"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s
    command: >
      --character-set-server=utf8mb4
      --collation-server=utf8mb4_unicode_ci
      --default-authentication-plugin=mysql_native_password
      --general-log=1
      --general-log-file=/var/lib/mysql/general.log

  redis:
    image: redis:6.0-alpine
    container_name: beijixing-redis-dev
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis_data_dev:/data
    networks:
      - beijixing-network-dev
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 30s
      timeout: 10s
      retries: 5
    command: redis-server --appendonly yes --requirepass dev123

  mongodb:
    image: mongo:6.0
    container_name: beijixing-mongodb-dev
    restart: unless-stopped
    environment:
      MONGO_INITDB_ROOT_USERNAME: admin
      MONGO_INITDB_ROOT_PASSWORD: admin123
      MONGO_INITDB_DATABASE: beijixing_logs
      TZ: Asia/Shanghai
    ports:
      - "27017:27017"
    volumes:
      - mongodb_data_dev:/data/db
    networks:
      - beijixing-network-dev
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s

  rabbitmq:
    image: rabbitmq:3.11-management-alpine
    container_name: beijixing-rabbitmq-dev
    restart: unless-stopped
    environment:
      RABBITMQ_DEFAULT_USER: dev
      RABBITMQ_DEFAULT_PASS: dev123
      RABBITMQ_DEFAULT_VHOST: /
      TZ: Asia/Shanghai
    ports:
      - "5672:5672"
      - "15672:15672"
    volumes:
      - rabbitmq_data_dev:/var/lib/rabbitmq
    networks:
      - beijixing-network-dev
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "ping"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s

  elasticsearch:
    image: elasticsearch:8.11.0
    container_name: beijixing-elasticsearch-dev
    restart: unless-stopped
    environment:
      - discovery.type=single-node
      - xpack.security.enabled=false
      - "ES_JAVA_OPTS=-Xms512m -Xmx512m"
      - TZ=Asia/Shanghai
    ports:
      - "9200:9200"
    volumes:
      - elasticsearch_data_dev:/usr/share/elasticsearch/data
    networks:
      - beijixing-network-dev
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:9200/_cluster/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s
    ulimits:
      memlock:
        soft: -1
        hard: -1

  # ============================================
  # 单体应用 - beijixing-app (端口 8080)
  # ============================================

  app:
    build:
      context: ../../backend
      dockerfile: Dockerfile
    image: beijixing/beijixing-ai-app:dev
    container_name: beijixing-app-dev
    restart: unless-stopped
    environment:
      - SPRING_PROFILES_ACTIVE=dev
      - DB_HOST=mariadb
      - DB_PORT=3306
      - DB_NAME=beijixing_ai
      - DB_USER=root
      - DB_PASSWORD=root123
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - REDIS_PASSWORD=dev123
      - RABBITMQ_HOST=rabbitmq
      - RABBITMQ_PORT=5672
      - RABBITMQ_USER=dev
      - RABBITMQ_PASSWORD=dev123
      - MONGO_HOST=mongodb
      - MONGO_PORT=27017
      - MONGO_USERNAME=admin
      - MONGO_PASSWORD=admin123
      - ELASTICSEARCH_HOST=elasticsearch
      - ELASTICSEARCH_PORT=9200
      - TZ=Asia/Shanghai
    ports:
      - "8080:8080"
      - "5005:5005"  # 远程调试端口
    volumes:
      - app_logs_dev:/opt/beijixing-ai/logs
      - app_uploads_dev:/opt/beijixing-ai/uploads
    depends_on:
      mariadb:
        condition: service_healthy
      redis:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
      elasticsearch:
        condition: service_healthy
      mongodb:
        condition: service_healthy
    networks:
      - beijixing-network-dev
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/actuator/health"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 90s

networks:
  beijixing-network-dev:
    driver: bridge
    name: beijixing-network-dev

volumes:
  mariadb_data_dev:
    driver: local
  redis_data_dev:
    driver: local
  mongodb_data_dev:
    driver: local
  rabbitmq_data_dev:
    driver: local
  elasticsearch_data_dev:
    driver: local
  app_logs_dev:
    driver: local
  app_uploads_dev:
    driver: local
