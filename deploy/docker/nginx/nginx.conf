# ============================================================
# 北极星AI商机获客系统 - Nginx 主配置文件
# Network Engineer: 郑华 (EMP-NETWORK-001)
# Description: 生产环境优化配置
# ============================================================

# 用户和工作进程配置
user nginx;
worker_processes auto;
worker_cpu_affinity auto;
worker_rlimit_nofile 65535;

# 错误日志和PID文件
error_log /var/log/nginx/error.log warn;
pid /var/run/nginx.pid;

# 事件配置
events {
    use epoll;
    worker_connections 65535;
    multi_accept on;
    accept_mutex on;
    accept_mutex_delay 1ms;
}

# HTTP配置
http {
    # ============================================================
    # 基础配置
    # ============================================================
    include /etc/nginx/mime.types;
    default_type application/octet-stream;

    # 字符编码
    charset utf-8;
    source_charset utf-8;

    # ============================================================
    # 性能优化
    # ============================================================
    
    # 文件传输优化
    sendfile on;
    tcp_nopush on;
    tcp_nodelay on;
    
    # 连接优化
    keepalive_timeout 65;
    keepalive_requests 10000;
    client_header_timeout 15;
    client_body_timeout 15;
    send_timeout 25;
    
    # 请求体大小限制
    client_max_body_size 100M;
    client_body_buffer_size 128k;
    client_header_buffer_size 4k;
    large_client_header_buffers 4 8k;

    # ============================================================
    # 日志配置
    # ============================================================
    log_format main '$remote_addr - $remote_user [$time_local] "$request" '
                    '$status $body_bytes_sent "$http_referer" '
                    '"$http_user_agent" "$http_x_forwarded_for" '
                    '$request_time $upstream_response_time '
                    '$upstream_addr $upstream_status';

    log_format json '{'
                    '"time": "$time_iso8601",'
                    '"remote_addr": "$remote_addr",'
                    '"remote_user": "$remote_user",'
                    '"request": "$request",'
                    '"status": "$status",'
                    '"body_bytes_sent": "$body_bytes_sent",'
                    '"request_time": "$request_time",'
                    '"upstream_response_time": "$upstream_response_time",'
                    '"upstream_addr": "$upstream_addr",'
                    '"http_referer": "$http_referer",'
                    '"http_user_agent": "$http_user_agent",'
                    '"http_x_forwarded_for": "$http_x_forwarded_for"'
                    '}';

    access_log /var/log/nginx/access.log main;

    # ============================================================
    # Gzip压缩配置
    # ============================================================
    gzip on;
    gzip_vary on;
    gzip_min_length 1k;
    gzip_proxied expired no-cache no-store private auth;
    gzip_types
        text/plain
        text/css
        text/xml
        text/javascript
        application/json
        application/javascript
        application/xml+rss
        application/atom+xml
        image/svg+xml
        font/woff
        font/woff2;
    gzip_comp_level 6;
    gzip_buffers 16 8k;
    gzip_http_version 1.1;

    # ============================================================
    # 安全相关配置
    # ============================================================
    
    # 隐藏版本信息
    server_tokens off;
    
    # 防止点击劫持
    add_header X-Frame-Options "SAMEORIGIN" always;
    
    # XSS保护
    add_header X-XSS-Protection "1; mode=block" always;
    
    # 内容类型嗅探保护
    add_header X-Content-Type-Options "nosniff" always;
    
    # 引用策略
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    
    # 内容安全策略 (开发阶段较宽松，生产环境需收紧)
    add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline' 'unsafe-eval'; style-src 'self' 'unsafe-inline'; img-src 'self' data: blob: https:; font-src 'self' data:; connect-src 'self' https:;" always;

    # ============================================================
    # 限速配置
    # ============================================================
    limit_req_zone $binary_remote_addr zone=api_limit:10m rate=100r/m;
    limit_req_zone $binary_remote_addr zone=login_limit:10m rate=10r/m;
    limit_conn_zone $binary_remote_addr zone=conn_limit:10m;

    # ============================================================
    # 代理优化
    # ============================================================
    proxy_buffering on;
    proxy_buffer_size 4k;
    proxy_buffers 8 4k;
    proxy_busy_buffers_size 8k;
    proxy_temp_file_write_size 64k;
    
    # 代理超时设置
    proxy_connect_timeout 60s;
    proxy_send_timeout 60s;
    proxy_read_timeout 60s;

    # ============================================================
    # 包含其他配置
    # ============================================================
    include /etc/nginx/conf.d/upstream.conf;
    include /etc/nginx/conf.d/*.conf;
}
