# ============================================================
# 北极星AI商机获客系统 - 默认站点配置
# Network Engineer: 郑华 (EMP-NETWORK-001)
# Description: 前端静态文件 + API代理
# ============================================================

server {
    listen 80;
    server_name localhost _ "";
    
    # 根目录
    root /usr/share/nginx/html;
    index index.html index.htm;
    
    # ============================================================
    # 安全头配置
    # ============================================================
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "geolocation=(), microphone=(), camera=()" always;

    # ============================================================
    # 前端静态文件服务
    # ============================================================
    
    # HTML文件 - 不缓存
    location ~* \.(html|htm)$ {
        expires -1;
        add_header Cache-Control "no-store, no-cache, must-revalidate, proxy-revalidate";
        try_files $uri $uri/ /index.html;
    }
    
    # JS/CSS文件 - 长期缓存（因为文件名包含hash）
    location ~* \.(js|css)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        access_log off;
    }
    
    # 图片和字体 - 长期缓存
    location ~* \.(jpg|jpeg|png|gif|ico|svg|woff|woff2|ttf|eot|otf)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        access_log off;
    }
    
    # 静态资源目录
    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        access_log off;
    }

    # ============================================================
    # API代理配置
    # ============================================================
    
    # 主API网关
    location /api/ {
        # 限速保护
        limit_req zone=api_limit burst=20 nodelay;
        limit_conn conn_limit 50;
        
        # 代理设置
        proxy_pass http://gateway_backend/;
        proxy_http_version 1.1;
        proxy_set_header Connection "";
        
        # 请求头
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Request-ID $request_id;
        
        # 超时设置
        proxy_connect_timeout 30s;
        proxy_send_timeout 60s;
        proxy_read_timeout 60s;
        
        # 错误处理
        proxy_intercept_errors on;
        error_page 502 503 504 /50x.json;
    }
    
    # 登录/认证接口 - 更严格的限流
    location /api/auth/ {
        limit_req zone=login_limit burst=5 nodelay;
        limit_conn conn_limit 10;
        
        proxy_pass http://gateway_backend/auth/;
        proxy_http_version 1.1;
        proxy_set_header Connection "";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Request-ID $request_id;
        
        proxy_connect_timeout 10s;
        proxy_send_timeout 30s;
        proxy_read_timeout 30s;
    }
    
    # WebSocket支持 (用于实时通知)
    location /ws/ {
        proxy_pass http://gateway_backend/ws/;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        
        proxy_read_timeout 86400s;
        proxy_send_timeout 86400s;
    }

    # ============================================================
    # 健康检查端点
    # ============================================================
    location /health {
        access_log off;
        return 200 "healthy\n";
        add_header Content-Type text/plain;
    }

    # ============================================================
    # 错误页面
    # ============================================================
    location = /50x.json {
        internal;
        add_header Content-Type application/json;
        return 502 '{"code": 502, "message": "服务暂时不可用，请稍后重试"}';
    }
    
    location = /404.html {
        internal;
    }
    
    # 默认路由 - 前端路由支持
    location / {
        try_files $uri $uri/ /index.html;
    }
}

