# Prometheus配置
global:
  scrape_interval: 15s
  evaluation_interval: 15s
  external_labels:
    cluster: beijixing-ai
    replica: '{{.ExternalURL}}'

alerting:
  alertmanagers:
    - static_configs:
        - targets: []

rule_files:
  - /etc/prometheus/rules/*.yml

scrape_configs:
  - job_name: 'prometheus'
    static_configs:
      - targets: ['localhost:9090']

  - job_name: 'beijixing-app'
    static_configs:
      - targets: ['app:8080']
    metrics_path: '/actuator/prometheus'
