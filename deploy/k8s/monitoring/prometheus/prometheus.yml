global:
  scrape_interval: 15s
  evaluation_interval: 15s

alerting:
  alertmanagers:
    - static_configs:
        - targets: []

rule_files: []

scrape_configs:
  # beijixing-app 单体应用
  - job_name: 'beijixing-app'
    metrics_path: '/actuator/prometheus'
    static_configs:
      - targets: ['beijixing-app:8080']
        labels:
          service: beijixing-app
          env: production

  # Prometheus 自身
  - job_name: 'prometheus'
    static_configs:
      - targets: ['localhost:9090']

  # Redis Exporter (可选)
  - job_name: 'redis'
    static_configs:
      - targets: ['redis-exporter:9121']
        labels:
          service: redis

  # MySQL Exporter (可选)
  - job_name: 'mysql'
    static_configs:
      - targets: ['mysqld-exporter:9104']
        labels:
          service: mysql
