apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: beijixing-ingress
  namespace: beijixing
  labels:
    app.kubernetes.io/name: beijixing-ingress
    app.kubernetes.io/part-of: beijixing-ai
  annotations:
    nginx.ingress.kubernetes.io/ssl-redirect: "true"
    nginx.ingress.kubernetes.io/force-ssl-redirect: "true"
    nginx.ingress.kubernetes.io/proxy-body-size: "50m"
    nginx.ingress.kubernetes.io/proxy-read-timeout: "300"
    nginx.ingress.kubernetes.io/proxy-send-timeout: "300"
    nginx.ingress.kubernetes.io/proxy-connect-timeout: "300"
    # 限流配置
    nginx.ingress.kubernetes.io/limit-rps: "100"
    nginx.ingress.kubernetes.io/limit-connections: "50"
    nginx.ingress.kubernetes.io/limit-rpm: "1000"
    # CORS配置
    nginx.ingress.kubernetes.io/enable-cors: "true"
    nginx.ingress.kubernetes.io/cors-allow-origin: "*"
    nginx.ingress.kubernetes.io/cors-allow-methods: "GET, PUT, POST, DELETE, PATCH, OPTIONS"
    nginx.ingress.kubernetes.io/cors-allow-headers: "DNT,X-CustomHeader,Keep-Alive,User-Agent,X-Requested-With,If-Modified-Since,Cache-Control,Content-Type,Authorization"
    # 证书管理
    cert-manager.io/cluster-issuer: "letsencrypt-prod"
spec:
  ingressClassName: nginx
  tls:
  - hosts:
    - api.beijixing.ai
    - app.beijixing.ai
    - admin.beijixing.ai
    secretName: beijixing-tls-secret
  rules:
  # API路由 - 所有/api/路径转发到单体应用
  - host: api.beijixing.ai
    http:
      paths:
      - path: /api/
        pathType: Prefix
        backend:
          service:
            name: beijixing-app
            port:
              number: 8080
  # 前端应用路由
  - host: app.beijixing.ai
    http:
      paths:
      - path: /
        pathType: Prefix
        backend:
          service:
            name: beijixing-app
            port:
              number: 8080
  # 管理后台路由
  - host: admin.beijixing.ai
    http:
      paths:
      - path: /
        pathType: Prefix
        backend:
          service:
            name: beijixing-app
            port:
              number: 8080
