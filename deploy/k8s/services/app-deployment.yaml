apiVersion: apps/v1
kind: Deployment
metadata:
  name: beijixing-app
  namespace: beijixing
  labels:
    app.kubernetes.io/name: beijixing-app
    app.kubernetes.io/part-of: beijixing-ai
    app.kubernetes.io/component: monolith
spec:
  replicas: 3
  selector:
    matchLabels:
      app.kubernetes.io/name: beijixing-app
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 25%
      maxUnavailable: 25%
  template:
    metadata:
      labels:
        app.kubernetes.io/name: beijixing-app
        app.kubernetes.io/part-of: beijixing-ai
    spec:
      containers:
      - name: beijixing-app
        image: beijixing-ai/beijixing-app:latest
        imagePullPolicy: IfNotPresent
        ports:
        - containerPort: 8080
          name: http
          protocol: TCP
        envFrom:
        - configMapRef:
            name: beijixing-config
        - secretRef:
            name: beijixing-secrets
        env:
        - name: SERVICE_NAME
          value: "beijixing-app"
        - name: SERVICE_PORT
          value: "8080"
        resources:
          requests:
            cpu: "1000m"
            memory: "2Gi"
          limits:
            cpu: "4000m"
            memory: "8Gi"
        livenessProbe:
          httpGet:
            path: /health
            port: 8080
          initialDelaySeconds: 60
          periodSeconds: 10
          timeoutSeconds: 5
          failureThreshold: 3
        readinessProbe:
          httpGet:
            path: /ready
            port: 8080
          initialDelaySeconds: 10
          periodSeconds: 5
          timeoutSeconds: 3
          failureThreshold: 3
        volumeMounts:
        - name: tmp
          mountPath: /tmp
        - name: uploads
          mountPath: /app/uploads
        - name: models
          mountPath: /models
        - name: data
          mountPath: /app/data
      volumes:
      - name: tmp
        emptyDir: {}
      - name: uploads
        persistentVolumeClaim:
          claimName: content-uploads-pvc
      - name: models
        persistentVolumeClaim:
          claimName: ai-models-pvc
      - name: data
        persistentVolumeClaim:
          claimName: storage-data-pvc
---
apiVersion: v1
kind: Service
metadata:
  name: beijixing-app
  namespace: beijixing
  labels:
    app.kubernetes.io/name: beijixing-app
    app.kubernetes.io/part-of: beijixing-ai
spec:
  type: ClusterIP
  ports:
  - port: 8080
    targetPort: 8080
    protocol: TCP
    name: http
  selector:
    app.kubernetes.io/name: beijixing-app
