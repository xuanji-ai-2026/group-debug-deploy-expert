server {
    listen 80;
    server_name www.beijixing-ai.com beijixing-ai.com;

    # 管理端
    location /admin/ {
        alias /opt/beijixing-ai/frontend/web-admin/dist/;
        index index.html;
        try_files $uri $uri/ /admin/index.html;

        location ~* \.(html|css|js|png|jpg|jpeg|gif|ico|svg|woff2?)$ {
            expires 7d;
            add_header Cache-Control "public, immutable";
        }
    }

    # PC端
    location / {
        root /opt/beijixing-ai/frontend/web-pc/dist;
        index index.html;
        try_files $uri $uri/ /index.html;

        location ~* \.(html|css|js|png|jpg|jpeg|gif|ico|svg|woff2?)$ {
            expires 7d;
            add_header Cache-Control "public, immutable";
        }
    }

    # API代理 - 通过网关
    location /api/ {
        proxy_pass http://127.0.0.1:8080/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Content-Type $content_type;
        proxy_set_header Content-Length $content_length;
        proxy_request_buffering off;

        # 超时设置
        proxy_connect_timeout 30s;
        proxy_send_timeout 60s;
        proxy_read_timeout 60s;

        # 支持大文件上传
        client_max_body_size 20m;

        # 禁用缓存
        add_header Cache-Control "no-store, no-cache, must-revalidate";
        add_header Pragma "no-cache";
        add_header Expires "0";
    }

    # Gzip压缩
    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml application/xml+rss text/image;
}
