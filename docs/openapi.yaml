          type: integer
        balance:
          type: number
          format: double
        conversionRate:
          type: number
          format: double
        recentActivities:
          type: array
          items:
            type: object

    TrendData:
      type: object
      properties:
        date:
          type: string
          format: date
        count:
          type: integer
        converted:
          type: integer

    TaskSummary:
      type: object
      properties:
        totalTasks:
          type: integer
        runningTasks:
          type: integer
        completedToday:
          type: integer
        successRate:
          type: number
          format: double
        avgDuration:
          type: number
          format: double

