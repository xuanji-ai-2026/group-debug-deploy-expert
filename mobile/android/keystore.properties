# 北极星AI商机获客系统 - APK签名配置
# 用于debug和release版本的keystore信息

# Debug签名（自动生成，无需手动创建）
# Android Studio会自动在 ~/.android/debug.keystore 生成

# Release签名配置（生产环境使用）
# 请将此文件中的密钥库信息替换为您的实际值

# 方式1：使用命令行参数传递（推荐）
# ./gradlew assembleRelease \
#   -PANDROID_KEYSTORE_PATH=/path/to/your.keystore \
#   -PANDROID_KEYSTORE_PASSWORD=your_password \
#   -PANDROID_KEY_ALIAS=your_alias \
#   -PANDROID_KEY_PASSWORD=your_key_password

# 方式2：在local.properties中配置（不提交到版本控制）
# ANDROID_KEYSTORE_PATH=/path/to/your.keystore
# ANDROID_KEYSTORE_PASSWORD=your_password
# ANDROID_KEY_ALIAS=your_alias
# ANDROID_KEY_PASSWORD=your_key_password

# ============================================================
# 自动生成Debug Keystore脚本（首次构建时执行）
# ============================================================
# keytool -genkeypair -v \
#   -keystore debug.keystore \
#   -storepass android \
#   -alias androiddebugkey \
#   -keypass android \
#   -keyalg RSA \
#   -keysize 2048 \
#   -validity 10000 \
#   -dname "CN=Android Debug,O=Android,C=US"

# ============================================================
# 生产环境Keystore生成示例
# ============================================================
# keytool -genkeypair -v \
#   -keystore release-keystore.jks \
#   -storepass Beijixing@2024!Secure \
#   -alias beijixing-release \
#   -keypass Beijixing@2024!Key \
#   -keyalg RSA \
#   -keysize 4096 \
#   -validity 10000 \
#   -dname "CN=Beijixing AI, OU=Mobile Dev, O=Beijixing Technology, L=Shenzhen, ST=Guangdong, C=CN"
