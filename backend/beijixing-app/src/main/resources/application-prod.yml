# ==============================================
# 北极星AI - 生产环境配置 (远程服务器)
# 用途: 正式部署到远程服务器
# 启动命令: java -jar beijixing-app.jar --spring.profiles.active=prod
# 环境变量: DB_HOST, DB_PORT, DB_NAME, DB_USER, DB_PASSWORD
#           REDIS_HOST, REDIS_PORT, REDIS_PASSWORD
# ==============================================

server:
  port: 8080
  tomcat:
    threads:
      max: 200
      min-spare: 10
    connection-timeout: 10000

spring:
  # ====== MariaDB生产数据库 ======
  datasource:
    driver-class-name: org.mariadb.jdbc.Driver
    url: jdbc:mariadb://${DB_HOST:localhost}:${DB_PORT:3306}/${DB_NAME:beijixing_ai}?useUnicode=true&characterEncoding=utf8mb4&useSSL=false&serverTimezone=Asia/Shanghai&allowPublicKeyRetrieval=true&rewriteBatchedStatements=true&autoReconnect=true&failOverReadOnly=false&maxReconnects=10
    username: ${DB_USER:root}
    password: ${DB_PASSWORD}
    hikari:
      minimum-idle: 10
      maximum-pool-size: 50
      connection-timeout: 30000
      idle-timeout: 600000
      max-lifetime: 1800000
      pool-name: beijixing-hikari-pool
      leak-detection-threshold: 60000

  # ====== Redis生产配置 ======
  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
      password: ${REDIS_PASSWORD:}
      database: 0
      timeout: 10000ms
      lettuce:
        pool:
          max-active: 50
          max-idle: 20
          min-idle: 10
          max-wait: 5000ms

  # ====== Flyway配置 (生产环境已有schema，需baseline) ======
  flyway:
    baseline-on-migrate: true
    baseline-version: 1
    locations: classpath:db/migration

  # ====== Jackson JSON ======
  jackson:
    time-zone: Asia/Shanghai
    date-format: yyyy-MM-dd HH:mm:ss
    default-property-inclusion: non_null

  # ====== 文件上传 ======
  servlet:
    multipart:
      max-file-size: 100MB
      max-request-size: 100MB

# ====== 日志配置 (生产环境) ======
logging:
  level:
    root: INFO
    com.beijixing: INFO
    com.baomidou.mybatisplus: WARN
  file:
    name: /opt/beijixing-ai/logs/application.log
  logback:
    rollingpolicy:
      max-file-size: 100MB
      max-history: 30
      total-size-cap: 3GB
